<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- responsiv. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>aRADIO</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255, 255, 255, 0.06);
    padding: 40px 30px;
    border-radius: 20px;

    /* responsiv. */
    width: 90%;
    max-width: 380px;

    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
}

.logo {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 15px;
    box-shadow: 0 0 15px rgba(255,255,255,0.1);

    /* responsiv. */
    max-width: 40vw;
    height: auto;
}

h1 {
    margin: 10px 0 5px;
    font-size: 22px;
}

.tagline {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

audio {
    width: 100%;
    margin-top: 10px;
}

.info {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.75;
    line-height: 1.6;
}

.live {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* params adicionais para phone */
@media (max-width: 480px) {

    .container {
        padding: 30px 20px;
    }

    h1 {
        font-size: 18px;
    }

    .tagline {
        font-size: 11px;
    }

    .info {
        font-size: 11px;
    }

    .live {
        font-size: 10px;
    }
}

</style>
</head>

<body>

<div class="container">

    <img class="logo" src="aradio-logo-globo.png" alt="aRADIO logo">

    <h1>(   (  ( aRADIO )  )   )</h1>

    <div class="tagline">
        "IN UNDERGROUND WE TRUST"
    </div>

    <div class="live" id="statusRadio"></div>

    <audio controls autoplay>
        <source src="https://tables-women-guarantees-heat.trycloudflare.com/radio" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <div class="info">
        ⚙️ Em desenvolvimento...<br>
        📞 contato.aradiofm@gmail.com<br>
        🌐 Instagram: @aradio.web
    </div>

</div>

<!-- STATUS DA RÁDIO -->
<script>

    const radioOnline = true;

    const status = document.getElementById("statusRadio");

    if (radioOnline) {

        status.innerHTML = "🔴 AO VIVO";
        status.style.color = "#00ff88";

    } else {

        status.innerHTML = "⚠️ SISTEMA EM MANUTENÇÃO";
        status.style.color = "#ff3b3b";

    }

</script>

</body>
</html>

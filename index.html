<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- responsiv. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>aRADIO</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.container {
    background: rgba(255, 255, 255, 0.06);
    padding: 40px 30px;
    border-radius: 22px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
}

.logo {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 18px;
    box-shadow: 0 0 20px rgba(255,255,255,0.12);
    max-width: 40vw;
}

h1 {
    margin: 10px 0 5px;
    font-size: 24px;
    font-weight: bold;
}

.tagline {
    font-size: 13px;
    opacity: 0.75;
    margin-bottom: 22px;
    letter-spacing: 1px;
}

audio {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
}

.info {
    margin-top: 24px;
    font-size: 12px;
    opacity: 0.78;
    line-height: 1.8;
}

.live {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    font-weight: bold;
    animation: pulse 1.5s infinite;
    letter-spacing: 1px;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* bloco manut. */
.maintenance-box {
    margin-top: 20px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(255, 59, 59, 0.12);
    border: 1px solid rgba(255, 59, 59, 0.35);
    display: none;
}

.maintenance-title {
    color: #ff5c5c;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.maintenance-text {
    font-size: 12px;
    line-height: 1.6;
    opacity: 0.85;
}

/* disposit. mobile */
@media (max-width: 480px) {

    .container {
        padding: 30px 20px;
    }

    h1 {
        font-size: 20px;
    }

    .tagline {
        font-size: 11px;
    }

    .info {
        font-size: 11px;
    }

    .live {
        font-size: 11px;
    }

    .maintenance-title {
        font-size: 13px;
    }

    .maintenance-text {
        font-size: 11px;
    }
}

</style>
</head>

<body>

<div class="container">

    <img class="logo" src="aradio-logo-globo.png" alt="aRADIO logo">

    <h1>(   (  ( aRADIO )  )   )</h1>

    <div class="tagline">
        A sua rádio underground de Goiânia!
    </div>

    <div class="live" id="statusRadio"></div>

    <div id="playerContainer">
        <audio controls autoplay>
            <source src="https://tables-women-guarantees-heat.trycloudflare.com/radio" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>
    </div>

    <div class="maintenance-box" id="maintenanceBox">

        <div class="maintenance-title">
            ⚠️ SISTEMA EM MANUTENÇÃO
        </div>

        <div class="maintenance-text">
            Não se preocupe!<br>
            Em breve retomamos a programação.
        </div>

    </div>

    <div class="info">
        ⚙️ Estamos em fase de testes...<br>
        📞 contato.aradiofm@gmail.com<br>
        🌐 Instagram: @aradio.web
    </div>

</div>

<!-- status on/off -->
<script>

    const radioOnline = true;

    const status = document.getElementById("statusRadio");
    const player = document.getElementById("playerContainer");
    const maintenance = document.getElementById("maintenanceBox");

    if (radioOnline) {

        status.innerHTML = "🔴 AO VIVO";
        status.style.color = "#00ff88";

        player.style.display = "block";
        maintenance.style.display = "none";

    } else {

        status.innerHTML = "⚠️ OFFLINE";
        status.style.color = "#ff5c5c";

        player.style.display = "none";
        maintenance.style.display = "block";

    }

</script>

</body>
</html>
